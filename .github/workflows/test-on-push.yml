name: Run Tests
on:
  push:
    branches:
      - '*'
jobs:
  run-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest ]
        ruby: [ '3.3.9', '3.4.1', '3.4.2', '3.4.3', '3.4.5', '3.4.6']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Build stub and run tests
        env:
          OCRAN_VERBOSE_TEST: 1
        run: |
          bundle exec rake build
          bundle exec rake test
