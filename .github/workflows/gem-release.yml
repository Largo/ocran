name: Build and Release Gem

on:
  push:
    tags:
      - '*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest   # x64-mingw-ucrt
          - os: ubuntu-latest    # x86_64-linux
          - os: macos-14     # arm64-darwin  (Apple Silicon)
          - os: macos-15-intel         # x86_64-darwin (Intel)

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
          mingw: "fox swig"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xz-utils gcc xpra xserver-xorg-video-dummy libxrandr-dev libfox-1.6-dev swig

      - name: Start xpra to enable GLX
        if: runner.os == 'Linux'
        run: |
          mkdir -p ${HOME}/.xpra
          xpra --xvfb="Xorg +extension GLX -config `pwd`/test/dummy.xorg.conf -logfile ${HOME}/.xpra/xorg.log" start :9
          echo "DISPLAY=:9" >> $GITHUB_ENV

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install xz fox swig

      - name: Install and start XQuartz
        if: runner.os == 'macOS'
        run: |
          brew install --cask xquartz
          open -a XQuartz

      - name: Build stubs and run tests
        run: |
          bundle exec rake build
          bundle exec rake test

      - name: Build platform gem
        run: gem build ocran.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.os }}
          path: '*.gem'

  build-source-gem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Build source gem
        run: gem build ocran-source.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: '*.gem'

  release:
    needs: [build, build-source-gem]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all gem artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          merge-multiple: true

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk "/^=== $VERSION/{found=1; next} found && /^===/{exit} found{print}" CHANGELOG.txt)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload gems
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            *.gem

      - name: Push gems to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          for gem in *.gem; do
            gem push "$gem"
          done
